<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 64" width="256" height="64" fill="none">
  <title>anima-prompt-helper logo</title>
  <!-- Background -->
  <rect width="256" height="64" rx="8" ry="8" fill="#1e1b4b"/>

  <!-- === Icon lockup (left, 48x48 centered in 64px tall strip) === -->
  <!-- Icon bg -->
  <rect x="8" y="8" width="48" height="48" rx="8" ry="8" fill="#2e2a6e" stroke="#6366f1" stroke-width="1.5"/>
  <!-- Left bracket -->
  <path d="M20 18 L16 18 L16 46 L20 46" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket -->
  <path d="M44 18 L48 18 L48 46 L44 46" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center sparkle (4-point star) -->
  <path d="M32 22 L33.5 29 L40 32 L33.5 35 L32 42 L30.5 35 L24 32 L30.5 29 Z" fill="#f472b6"/>
  <!-- Accent dot -->
  <circle cx="43" cy="20" r="1.8" fill="#f472b6" opacity="0.75"/>
  <!-- Three palette dots -->
  <circle cx="27" cy="51" r="2" fill="#6366f1"/>
  <circle cx="32" cy="51" r="2" fill="#22d3ee"/>
  <circle cx="37" cy="51" r="2" fill="#f472b6"/>

  <!-- === Wordmark: "anima" === -->
  <!-- Using inline text with monospace fallback as permitted by brief -->
  <text x="68" y="26" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold" letter-spacing="1" fill="#22d3ee">anima</text>

  <!-- === Wordmark: "-prompt-helper" in lighter weight === -->
  <text x="68" y="44" font-family="'Courier New', Courier, monospace" font-size="11" font-weight="normal" letter-spacing="0.5" fill="#a5b4fc">-prompt-helper</text>

  <!-- Decorative thin line separator between icon and text -->
  <line x1="62" y1="12" x2="62" y2="52" stroke="#6366f1" stroke-width="0.75" opacity="0.5"/>

  <!-- Small version indicator dots (top-right corner decoration) -->
  <circle cx="244" cy="12" r="2" fill="#f472b6" opacity="0.6"/>
  <circle cx="250" cy="12" r="2" fill="#22d3ee" opacity="0.6"/>
</svg>
